{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Área privada | Gestión de Clientes{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/private.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="private-topbar">
        <a href="{% url 'client_list' %}" class="private-topbar__brand">Gestión de Clientes</a>
        <div class="private-topbar__user">
            <span class="private-topbar__username">
                Hola, <strong>{{ user.username }}</strong>
            </span>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="private-btn">Cerrar sesión</button>
            </form>
        </div>
    </header>

    <div class="private-layout">
        <aside class="private-sidebar">
            <p class="private-sidebar__label">Menú</p>
            <nav>
                <ul class="private-nav">
                    <li>
                        <a
                            href="{% url 'client_list' %}"
                            class="private-nav__link{% if active_menu == 'clients' %} private-nav__link--active{% endif %}"
                        >
                            Clientes
                        </a>
                    </li>
                    <li>
                        <a
                            href="{% url 'supplier_list' %}"
                            class="private-nav__link{% if active_menu == 'suppliers' %} private-nav__link--active{% endif %}"
                        >
                            Proveedores
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="private-main">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Scripts globales -->
    <script src="{% static 'js/private-listing.js' %}"></script>
    <script src="{% static 'js/private-tooltip.js' %}"></script>
    <script src="{% static 'js/private-loader.js' %}"></script>

    <!-- Scripts específicos -->
    {% block extra_js %}{% endblock %}
</body>
</html>

{% extends 'private/base_private.html' %}
{% load static %}

{% block title %}Proveedores | Gestión de Clientes{% endblock %}

{% block content %}
<header class="private-page-header private-page-header--with-actions">
    <div>
        <h1>Proveedores</h1>
        <p>Listado de proveedores asociados a clientes.</p>
    </div>
    <button
        type="button"
        id="supplier-new-button"
        class="private-btn private-btn--primary"
        data-create-url="{% url 'supplier_create' %}"
    >
        Nuevo
    </button>
</header>

<section
    class="private-card"
    id="suppliers-list"
    data-has-filters="false"
    data-search-url="{% url 'supplier_search' %}"
>
    <form class="private-search" id="supplier-search-form" method="get" action="">
        <input type="hidden" name="sort" value="name">
        <input type="hidden" name="order" value="asc">
        <input type="hidden" name="page" value="1">
        <input type="hidden" name="page_size" value="20">

        <div class="private-search__field">
            <label for="supplier-search">Buscar proveedores</label>
            <input
                id="supplier-search"
                type="search"
                name="q"
                placeholder="Nombre, email, teléfono o empresa..."
            >
        </div>
        <div class="private-search__field private-search__field--select">
            <label for="supplier-client-filter">Cliente</label>
            <select id="supplier-client-filter" name="client_id">
                <option value="">Todos los clientes</option>
            </select>
        </div>
        <div class="private-search__field private-search__field--date">
            <label for="supplier-date-from">Desde</label>
            <input id="supplier-date-from" type="date" name="date_from">
        </div>
        <div class="private-search__field private-search__field--date">
            <label for="supplier-date-until">Hasta</label>
            <input id="supplier-date-until" type="date" name="date_until">
        </div>
        <div class="private-search__actions">
            <button type="submit" class="private-btn private-btn--primary" id="supplier-search-submit">
                Buscar
            </button>
        </div>
    </form>

    <div id="suppliers-results">
        <div class="private-table-wrap" id="suppliers-table-wrap" hidden>
            <table class="private-table" id="suppliers-table">
                <thead>
                    <tr>
                        <th data-sort-field="name">
                            <button type="button" class="private-table__sort private-table__sort--active private-table__sort--asc">
                                <span>Nombre</span>
                                <span class="private-table__sort-icon" aria-hidden="true"></span>
                            </button>
                        </th>
                        <th data-sort-field="company_name">
                            <button type="button" class="private-table__sort">
                                <span>Razón social</span>
                                <span class="private-table__sort-icon" aria-hidden="true"></span>
                            </button>
                        </th>
                        <th data-sort-field="email">
                            <button type="button" class="private-table__sort">
                                <span>Email</span>
                                <span class="private-table__sort-icon" aria-hidden="true"></span>
                            </button>
                        </th>
                        <th data-sort-field="phone">
                            <button type="button" class="private-table__sort">
                                <span>Teléfono</span>
                                <span class="private-table__sort-icon" aria-hidden="true"></span>
                            </button>
                        </th>
                        <th data-sort-field="city">
                            <button type="button" class="private-table__sort">
                                <span>Ciudad</span>
                                <span class="private-table__sort-icon" aria-hidden="true"></span>
                            </button>
                        </th>
                        <th class="private-table__cell--clients">Clientes</th>
                        <th data-sort-field="date">
                            <button type="button" class="private-table__sort">
                                <span>Fecha</span>
                                <span class="private-table__sort-icon" aria-hidden="true"></span>
                            </button>
                        </th>
                        <th class="private-table__actions-head">Acciones</th>
                    </tr>
                </thead>
                <tbody id="suppliers-table-body"></tbody>
            </table>
        </div>
        <div id="suppliers-pagination" class="private-pagination" hidden>
            <p class="private-pagination__info" id="suppliers-pagination-info"></p>
            <div class="private-pagination__controls">
                <div class="private-pagination__page-size">
                    <label for="suppliers-page-size">Por página</label>
                    <select id="suppliers-page-size" aria-label="Elementos por página">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <nav class="private-pagination__nav" aria-label="Paginación de proveedores">
                    <button type="button" class="private-btn private-pagination__nav-btn" id="suppliers-pagination-prev" disabled>Anterior</button>
                    <div class="private-pagination__pages" id="suppliers-pagination-pages"></div>
                    <button type="button" class="private-btn private-pagination__nav-btn" id="suppliers-pagination-next" disabled>Siguiente</button>
                </nav>
            </div>
        </div>
        <p id="suppliers-empty" class="private-empty" hidden></p>
    </div>
</section>
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/private-listing.js' %}"></script>
    <script src="{% static 'js/private-tooltip.js' %}"></script>
    <script src="{% static 'js/suppliers-delete.js' %}"></script>
    <script src="{% static 'js/suppliers-search.js' %}"></script>
{% endblock %}
